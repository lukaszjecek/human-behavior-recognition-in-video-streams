directories:
  raw: "/app/data/raw"
  processed: "/app/data/processed"
  manifests: "/app/data/manifests"          

pipeline:
  seed: 42
  target_resolution: [224, 224]
  temporal_window: 16              

inference:
  stride: 1
  class_labels:
    - car_drops_off_person
    - car_makes_u_turn
    - motorcycle_makes_u_turn
    - motorcycle_turns_right
    - person_sits_down

tracking:
  default_track_id: null

splits:
  train: 0.7
  val: 0.15
  test: 0.15
