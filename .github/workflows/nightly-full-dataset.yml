name: Nightly Full Dataset

on:
  schedule:
    - cron: "15 2 * * *"
  workflow_dispatch:

concurrency:
  group: nightly-full-dataset
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  nightly-full-dataset:
    name: nightly-full-dataset
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install helpers
        run: |
          python -m pip install --upgrade pip
          python -m pip install gdown==5.2.1
          python -m gdown --version

      - name: Prepare nightly workspace
        shell: bash
        run: |
          rm -rf data/nightly_raw data/nightly_logs data/nightly_zip
          mkdir -p data/nightly_raw data/nightly_logs data/nightly_zip

      - name: Download full dataset zip from Google Drive
        run: |
          python -m gdown "https://drive.google.com/uc?id=${{ vars.GDRIVE_FILE_ID }}" -O "data/nightly_zip/${{ vars.FULL_DATASET_ZIP_NAME }}"

      - name: Unpack dataset
        run: |
          python - <<'PY'
          import zipfile
          from pathlib import Path

          zip_path = Path("data/nightly_zip/${{ vars.FULL_DATASET_ZIP_NAME }}")
          out_dir = Path("data/nightly_raw")

          with zipfile.ZipFile(zip_path, "r") as zf:
              zf.extractall(out_dir)

          print("[OK] Dataset unpacked.")
          PY

      - name: Build inference service
        run: docker compose build inference

      - name: Run nightly validation through Docker Compose
        run: |
          docker compose run --rm \
            -e DATA_DIR=/app/data/nightly_raw \
            -e LOG_DIR=/app/data/nightly_logs \
            inference sh -lc "python -m src.main"

      - name: Validate startup summary
        shell: bash
        run: |
          python - <<'PY'
          import json
          from pathlib import Path

          summary_path = Path("data/nightly_logs/startup_summary.json")
          if not summary_path.exists():
              raise SystemExit("startup_summary.json was not created")

          summary = json.loads(summary_path.read_text(encoding="utf-8"))

          if summary.get("video_count", 0) <= 0:
              raise SystemExit(f"Expected video_count > 0, got: {summary.get('video_count')}")

          if summary.get("class_count", 0) <= 0:
              raise SystemExit(f"Expected class_count > 0, got: {summary.get('class_count')}")

          print("[OK] Nightly full-dataset validation passed.")
          PY

      - name: Show container logs on failure
        if: failure()
        run: docker compose logs inference

      - name: Cleanup containers
        if: always()
        run: docker compose down --volumes --remove-orphans